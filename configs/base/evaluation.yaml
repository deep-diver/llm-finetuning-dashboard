# Base Evaluation Configuration
evaluation:
  # Local diagnostic evaluation parameters (Hyperparameter Tuning Loop)
  local:
    max_steps: 20
    eval_batch_size: 4
    max_parallel_experiments_per_param: 10 # Max parallel trials per hyperparameter
    max_target_hyperparameters: 10 # Max number of hyperparameters to search sequentially
    metrics:
      - "loss"
      - "gradient_norm"
    generation_samples: 5
    
  # Full evaluation parameters
  full:
    eval_batch_size: 8
    metrics:
      - "loss"
      - "perplexity"
      - "instruction_following_score"
      - "rouge-l"
    generation_samples: 50
    comparison_baseline_model: "meta-llama/Llama-3.2-1B-Instruct"
